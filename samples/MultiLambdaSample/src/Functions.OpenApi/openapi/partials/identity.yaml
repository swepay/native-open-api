openapi: "3.1.0"

info:
  title: "Identity API"
  version: "1.0.0"

paths:
  /v1/auth/login:
    options:
      operationId: LoginOptions
      summary: "Metadados de métodos de autenticação"
      description: "Demonstra suporte ao Map<TCommand, TResponse> com método HTTP customizado"
      tags:
        - Identity
        - Metadata
      security: []
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginOptionsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      operationId: LoginWithPasswordFluent
      summary: "Realiza login com senha"
      description: "Demonstra precedência de fluent metadata sobre atributos"
      tags:
        - Identity
        - Auth
        - Fluent
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCommand"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidCredentialsError"
        "429":
          description: "Response 429"
          content:
            application/problem+json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/auth/refresh:
    post:
      operationId: RefreshToken
      summary: "Renova access token"
      description: "Demonstra metadata via atributos para request form-urlencoded"
      tags:
        - Identity
        - OAuth2
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                clientId:
                  type: string
                refreshToken:
                  type: string
                scope:
                  type: string
              required:
                - clientId
                - refreshToken
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"
        "422":
          description: "Unprocessable Entity"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationProblemError"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/auth/register:
    post:
      operationId: RegisterUser
      summary: "Registra um novo usuário"
      description: "Cria um novo usuário no domínio de identidade"
      tags:
        - Identity
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCommand"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: "Bad Request"
          content:
            application/problem+json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  schemas:
    LoginCommand:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
    LoginOptionsCommand:
      type: object
      description: "Request type - properties to be documented"
    LoginOptionsResponse:
      type: object
      properties:
        methods:
          type: array
          items:
            type: string
      required:
        - methods
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int64
      required:
        - accessToken
        - refreshToken
        - expiresIn
    RefreshTokenCommand:
      type: object
      properties:
        clientId:
          type: string
        refreshToken:
          type: string
        scope:
          type: string
      required:
        - clientId
        - refreshToken
    RefreshTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int64
      required:
        - accessToken
        - refreshToken
        - expiresIn
    RegisterCommand:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        displayName:
          type: string
      required:
        - email
        - password
        - displayName
    RegisterResponse:
      type: object
      properties:
        userId:
          type: string
        message:
          type: string
      required:
        - userId
        - message
