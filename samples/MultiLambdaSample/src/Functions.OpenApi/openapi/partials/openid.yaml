openapi: "3.1.0"

info:
  title: "OpenID Connect API"
  version: "1.0.0"

paths:
  /.well-known/jwks.json:
    get:
      operationId: GetJwks
      summary: "Retorna JWKS para validação de tokens"
      tags:
        - OpenID
        - Discovery
      security: []
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JwksResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /.well-known/openid-configuration:
    get:
      operationId: GetOpenIdConfiguration
      summary: "Retorna metadata OpenID Connect"
      tags:
        - OpenID
        - Discovery
      security: []
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenIdConfigurationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/openid/token:
    post:
      operationId: ExchangeAuthorizationCode
      summary: "Troca authorization code por tokens"
      description: "Demonstra .Accepts(form-urlencoded) com schema inline de propriedades"
      tags:
        - OpenID
        - OAuth2
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                clientId:
                  type: string
                clientSecret:
                  type: string
                grantType:
                  type: string
                code:
                  type: string
                redirectUri:
                  type: string
              required:
                - clientId
                - grantType
                - code
                - redirectUri
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: "Bad Request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidGrantError"
        "401":
          description: "Unauthorized"
          content:
            application/problem+json:
              schema:
                type: object
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  schemas:
    JwksCommand:
      type: object
      description: "Request type - properties to be documented"
    JwksResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/JwkKey"
      required:
        - keys
    OpenIdConfigurationCommand:
      type: object
      description: "Request type - properties to be documented"
    OpenIdConfigurationResponse:
      type: object
      properties:
        issuer:
          type: string
        authorizationEndpoint:
          type: string
        tokenEndpoint:
          type: string
        jwksUri:
          type: string
        responseTypesSupported:
          type: array
          items:
            type: string
        subjectTypesSupported:
          type: array
          items:
            type: string
        idTokenSigningAlgValuesSupported:
          type: array
          items:
            type: string
      required:
        - issuer
        - authorizationEndpoint
        - tokenEndpoint
        - jwksUri
        - responseTypesSupported
        - subjectTypesSupported
        - idTokenSigningAlgValuesSupported
    TokenCommand:
      type: object
      properties:
        clientId:
          type: string
        clientSecret:
          type: string
        grantType:
          type: string
        code:
          type: string
        redirectUri:
          type: string
      required:
        - clientId
        - grantType
        - code
        - redirectUri
    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
          format: int64
        idToken:
          type: string
      required:
        - accessToken
        - tokenType
        - expiresIn
        - idToken
