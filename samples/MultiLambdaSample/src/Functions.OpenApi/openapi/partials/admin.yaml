openapi: "3.1.0"

info:
  title: "Admin API"
  version: "1.0.0"

paths:
  /v1/admin/users:
    get:
      operationId: ListAdminUsers
      summary: "Lista usuários administrativos"
      description: "Retorna usuários administrativos e demonstra precedência de fluent metadata sobre atributos"
      tags:
        - Admin
        - Users
      security:
        - JwtBearer: []
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersResponse"
        "400":
          description: "Bad Request"
          content:
            application/problem+json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      operationId: CreateAdminUser
      summary: "Cria usuário administrativo"
      description: "Cria um usuário com payload JSON e inclui resposta adicional tipada"
      tags:
        - Admin
        - Users
      security:
        - JwtBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserCommand"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"
        "409":
          description: "Conflict"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAlreadyExistsError"
        "422":
          description: "Unprocessable Entity"
          content:
            application/problem+json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/admin/users/{id}:
    delete:
      operationId: DeleteAdminUser
      summary: "Remove usuário"
      description: "Remove um usuário administrativo pelo id"
      tags:
        - Admin
        - Users
      security:
        - JwtBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUserResponse"
        "404":
          description: "Not Found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserNotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      operationId: ReplaceAdminUserRole
      summary: "Substitui role do usuário"
      description: "Demonstra suporte ao MapPut com request tipado"
      tags:
        - Admin
        - Users
      security:
        - JwtBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleCommand"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserRoleResponse"
        "404":
          description: "Not Found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserNotFoundError"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/admin/users/{id}/role:
    patch:
      operationId: UpdateAdminUserRole
      summary: "Atualiza role do usuário"
      description: "Demonstra suporte ao MapPatch com schema de request/response"
      tags:
        - Admin
        - Users
      security:
        - JwtBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleCommand"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserRoleResponse"
        "404":
          description: "Not Found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserNotFoundError"
        "409":
          description: "Conflict"
          content:
            application/problem+json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  schemas:
    CreateUserCommand:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
        displayName:
          type: string
      required:
        - email
        - role
    CreateUserResponse:
      type: object
      properties:
        id:
          type: string
        message:
          type: string
      required:
        - id
        - message
    DeleteUserCommand:
      type: object
      properties:
        id:
          type: string
      required:
        - id
    DeleteUserResponse:
      type: object
      properties:
        id:
          type: string
        message:
          type: string
      required:
        - id
        - message
    ListUsersCommand:
      type: object
      description: "Request type - properties to be documented"
    ListUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserDto"
      required:
        - users
    UpdateUserRoleCommand:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
      required:
        - id
        - role
    UpdateUserRoleResponse:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
        message:
          type: string
      required:
        - id
        - role
        - message
